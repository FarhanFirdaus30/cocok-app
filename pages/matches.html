<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kecocokan &amp; Chat — Cocok</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="app-shell">

  <header class="app-topbar">
    <div class="logo">Cocok<span class="dot">.</span></div>
    <a href="profile.html" class="icon-btn" title="Profil saya">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </a>
  </header>

  <main class="app-main" id="mainContent">
    <!-- diisi JS -->
  </main>

  <nav class="bottom-nav">
    <a href="discover.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
      Jelajah
    </a>
    <a href="matches.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      Cocok
    </a>
    <a href="matches.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
      Chat
    </a>
    <a href="profile.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      Profil
    </a>
  </nav>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
  requireAuth('login.html');

  const main = document.getElementById('mainContent');
  const matches = getMatches();

  if (matches.length === 0) {
    main.innerHTML = `
      <div class="empty-state">
        <svg width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="#E8546B" stroke-width="1.6"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        <h3>Belum ada kecocokan</h3>
        <p>Mulai jelajahi profil dan geser kartu untuk menemukan yang cocok denganmu.</p>
        <a href="discover.html" class="btn btn-primary btn-sm" style="margin-top:16px;">Mulai Jelajah</a>
      </div>`;
  } else {
    const newRow = document.createElement('div');
    newRow.innerHTML = `
      <div class="section-title">
        <h2>Kecocokan Baru</h2>
        <p>${matches.length} orang saling suka denganmu</p>
      </div>
      <div class="new-matches-row" id="newMatchesRow"></div>
      <div class="section-title">
        <h2>Pesan</h2>
      </div>
      <div class="chat-list" id="chatList"></div>
    `;
    main.appendChild(newRow);

    const rowEl = document.getElementById('newMatchesRow');
    const listEl = document.getElementById('chatList');

    matches.forEach((id) => {
      const profile = findProfile(id);
      if (!profile) return;

      const item = document.createElement('a');
      item.href = `chat.html?id=${id}`;
      item.className = 'new-match-item';
      item.innerHTML = `
        <div class="circle-avatar" style="${avatarStyle(profile.id)}">${initialsOf(profile.name)}</div>
        <span>${profile.name.split(' ')[0]}</span>
      `;
      rowEl.appendChild(item);

      const last = lastMessage(id);
      const row = document.createElement('a');
      row.href = `chat.html?id=${id}`;
      row.className = 'chat-row';
      row.innerHTML = `
        <div class="circle-avatar" style="${avatarStyle(profile.id)}">${initialsOf(profile.name)}</div>
        <div class="chat-meta">
          <div class="top-line">
            <h4>${profile.name}</h4>
            ${last ? `<time>${formatTime(last.time)}</time>` : ''}
          </div>
          <p>${last ? (last.from === 'me' ? 'Kamu: ' : '') + last.text : 'Kalian baru saja cocok. Sapa duluan yuk!'}</p>
        </div>
        ${last && last.from === 'them' ? '<span class="unread-dot"></span>' : ''}
      `;
      listEl.appendChild(row);
    });
  }
</script>
</body>
</html>
