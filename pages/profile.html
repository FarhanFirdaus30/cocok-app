<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profil Saya — Cocok</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="app-shell">

  <header class="app-topbar">
    <div class="logo">Cocok<span class="dot">.</span></div>
    <button class="icon-btn" id="logoutBtn" title="Keluar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
    </button>
  </header>

  <main class="app-main">
    <div class="profile-hero">
      <div class="circle-avatar" id="profileAvatar"></div>
      <h2 id="profileName"></h2>
      <p id="profileLoc"></p>

      <div class="stats-row">
        <div class="stat"><strong id="statLiked">0</strong><span>Disukai</span></div>
        <div class="stat"><strong id="statMatches">0</strong><span>Cocok</span></div>
        <div class="stat"><strong id="statChats">0</strong><span>Obrolan</span></div>
      </div>
    </div>

    <div class="profile-section">
      <h3>Tentang Saya</h3>
      <div class="info-card">
        <p id="profileBio"></p>
      </div>
    </div>

    <div class="profile-section">
      <h3>Minat</h3>
      <div class="tag-row" id="profileInterests"></div>
    </div>

    <div class="profile-section">
      <h3>Ubah Bio</h3>
      <div class="field">
        <textarea id="editBio" placeholder="Ceritakan tentang dirimu..."></textarea>
      </div>
      <button class="btn btn-primary btn-block" id="saveBioBtn">Simpan Perubahan</button>
    </div>

    <div class="profile-section">
      <button class="btn btn-outline btn-block" id="logoutBtn2">Keluar dari Akun</button>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="discover.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
      Jelajah
    </a>
    <a href="matches.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      Cocok
    </a>
    <a href="matches.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
      Chat
    </a>
    <a href="profile.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      Profil
    </a>
  </nav>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
  const user = requireAuth('login.html');

  document.getElementById('profileAvatar').style.cssText += avatarStyle(user.name);
  document.getElementById('profileAvatar').textContent = initialsOf(user.name);
  document.getElementById('profileName').textContent = `${user.name}, ${user.age}`;
  document.getElementById('profileLoc').textContent = `📍 ${user.city}`;
  document.getElementById('profileBio').textContent = user.bio;
  document.getElementById('editBio').value = user.bio;

  const interestsEl = document.getElementById('profileInterests');
  (user.interests && user.interests.length ? user.interests : ['Belum ada minat ditambahkan']).forEach((tag) => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = tag;
    interestsEl.appendChild(span);
  });

  // Statistik
  const liked = getLiked();
  const matches = getMatches();
  const chatsWithMessages = matches.filter((id) => getChat(id).length > 0);
  document.getElementById('statLiked').textContent = liked.length;
  document.getElementById('statMatches').textContent = matches.length;
  document.getElementById('statChats').textContent = chatsWithMessages.length;

  document.getElementById('saveBioBtn').addEventListener('click', () => {
    const newBio = document.getElementById('editBio').value.trim();
    user.bio = newBio || user.bio;
    saveUser(user);
    document.getElementById('profileBio').textContent = user.bio;
    showToast('Bio berhasil diperbarui');
  });

  function doLogout() {
    logoutUser();
    window.location.href = '../index.html';
  }
  document.getElementById('logoutBtn').addEventListener('click', doLogout);
  document.getElementById('logoutBtn2').addEventListener('click', doLogout);
</script>
</body>
</html>
